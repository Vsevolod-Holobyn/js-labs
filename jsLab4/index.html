<body>
    <h1>Лабораторна робота №4</h1>

    <script src="sort.js"></script>
    <script>
        const sparse = new Array(100);

        for (let i = 0; i < 80; i++) { 
            sparse[Math.floor(Math.random() * 100)] = Math.floor(Math.random() * 500);
        }

        console.log("Початковий розріджений масив:");
        console.log(sparse);

        console.log("Сортування:");

        console.log("Result:", MySortLib.bubbleSort(sparse, true));
        console.log("Result:", MySortLib.selectionSort(sparse, false));
        console.log("Result:", MySortLib.insertionSort(sparse, true));
        console.log("Result:", MySortLib.shellSort(sparse, false));
        console.log("Result:", MySortLib.quickSort(sparse, true));

    </script>
